name: SonarQube Analysis

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      api: ${{ github.event_name == 'push' || steps.filter.outputs.api == 'true' }}
      web: ${{ github.event_name == 'push' || steps.filter.outputs.web == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/protos/**'
              - '.github/workflows/sonar.yml'
            web:
              - 'apps/web/**'
              - 'packages/protos/**'
              - '.github/workflows/sonar.yml'

  sonarqube-api:
    name: SonarQube Scan — Go API
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache: true
          cache-dependency-path: apps/api/go.sum

      - uses: actions/cache@v4
        id: protoc-cache
        with:
          path: ~/go/bin
          key: protoc-plugins-go-v1.36.6-connect-go-v1.18.1

      - name: Install protoc-gen plugins
        if: steps.protoc-cache.outputs.cache-hit != 'true'
        working-directory: apps/api
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.6
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@v1.18.1

      - name: Generate protobuf files
        uses: bufbuild/buf-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          push: false
          lint: false
          breaking: false

      - name: Download Go module dependencies
        working-directory: apps/api
        run: go mod download

      - name: Run tests with coverage
        working-directory: apps/api
        run: go test ./src/test/... -coverprofile=coverage.out -covermode=atomic -coverpkg=./src/services/...
        continue-on-error: true

      - name: Compute SonarQube branch args
        id: sonar_args_api
        run: |
          if [[ "$EVENT" == "pull_request" ]]; then
            echo "args=-Dsonar.pullrequest.key=${PR_NUMBER} -Dsonar.pullrequest.branch=${PR_BRANCH} -Dsonar.pullrequest.base=${PR_BASE}" >> "$GITHUB_OUTPUT"
          else
            echo "args=-Dsonar.branch.name=${REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
        env:
          EVENT: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.head_ref }}
          PR_BASE: ${{ github.base_ref }}
          REF_NAME: ${{ github.ref_name }}

      - uses: sonarsource/sonarqube-scan-action@v3
        with:
          projectBaseDir: apps/api
          args: >
            -Dsonar.projectKey=resto-rate-api
            -Dsonar.host.url=https://sonarqube.mati-lab.online
            ${{ steps.sonar_args_api.outputs.args }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  sonarqube-web:
    name: SonarQube Scan — Web
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        working-directory: apps/web
        run: bun install

      - name: Run tests with coverage
        working-directory: apps/web
        run: bunx vitest run --coverage --coverage.reporter=lcov --passWithNoTests
        continue-on-error: true

      - name: Compute SonarQube branch args
        id: sonar_args_web
        run: |
          if [[ "$EVENT" == "pull_request" ]]; then
            echo "args=-Dsonar.pullrequest.key=${PR_NUMBER} -Dsonar.pullrequest.branch=${PR_BRANCH} -Dsonar.pullrequest.base=${PR_BASE}" >> "$GITHUB_OUTPUT"
          else
            echo "args=-Dsonar.branch.name=${REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
        env:
          EVENT: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.head_ref }}
          PR_BASE: ${{ github.base_ref }}
          REF_NAME: ${{ github.ref_name }}

      - uses: sonarsource/sonarqube-scan-action@v3
        with:
          projectBaseDir: apps/web
          args: >
            -Dsonar.projectKey=resto-rate-web
            -Dsonar.host.url=https://sonarqube.mati-lab.online
            ${{ steps.sonar_args_web.outputs.args }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
