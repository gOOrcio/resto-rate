name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  api:
    name: Go API — build + test
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Install protoc-gen plugins
        working-directory: apps/api
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.6
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@v1.18.1

      - name: Generate Go protobuf files
        uses: bufbuild/buf-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          push: false
          lint: false
          breaking: false

      - name: Build
        run: bunx nx run api:build

      - name: Test with coverage
        working-directory: apps/api
        run: go test ./src/test/... -coverprofile=coverage.out -covermode=atomic

      - name: Coverage summary
        working-directory: apps/api
        run: |
          echo "## Go Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  web:
    name: Web — svelte-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Setup buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Type check
        run: bunx nx run web:check
