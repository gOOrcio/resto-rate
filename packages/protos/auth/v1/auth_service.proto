syntax = "proto3";

package auth.v1;

import "users/v1/user.proto";

option go_package = "api/src/generated/auth/v1";

enum AuthProvider {
  AUTH_PROVIDER_UNSPECIFIED = 0;
  AUTH_PROVIDER_GOOGLE = 1;
  AUTH_PROVIDER_APPLE = 2; // reserved — not yet implemented
}

service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc GetCurrentUser(GetCurrentUserRequest) returns (GetCurrentUserResponse);
}

message LoginRequest {
  AuthProvider provider = 1;
  string id_token = 2;
}

message LoginResponse {
  users.v1.UserProto user = 1;
}

message LogoutRequest {}

message LogoutResponse {
  bool success = 1;
}

message GetCurrentUserRequest {}

message GetCurrentUserResponse {
  users.v1.UserProto user = 1;
}
