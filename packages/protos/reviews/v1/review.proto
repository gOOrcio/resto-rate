syntax = "proto3";

package reviews.v1;

option go_package = "api/src/generated/reviews/v1";

enum WouldVisitAgain {
  WOULD_VISIT_AGAIN_UNSPECIFIED = 0;
  WOULD_VISIT_AGAIN_YES = 1;
  WOULD_VISIT_AGAIN_MAYBE = 2;
  WOULD_VISIT_AGAIN_NO = 3;
}

message ReviewProto {
  string id = 1;
  string google_places_id = 2;
  string user_id = 3;
  string restaurant_id = 4;
  string comment = 5;
  double rating = 6;
  int64 created_at = 7;
  int64 updated_at = 8;
  repeated string tags = 9;
  string restaurant_name = 10;
  string restaurant_address = 11;
  string restaurant_city = 12;
  string restaurant_country = 13;
  string author_name = 14;

  // Optional extra detail fields
  int64 visited_at = 15;
  reserved 16, 17;
  reserved "party_size", "occasion";
  int32 price_paid_per_person = 18;
  WouldVisitAgain would_visit_again = 19;
  string dish_highlights = 20;
  string restaurant_photo_reference = 21;
}
